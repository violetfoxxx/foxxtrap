<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FOXX TRAP GAME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #bc13fe;
            --neon-blue: #00ffff;
            --white-glow: #fff0f5;
        }

        body { 
            background-color: #030104; 
            color: #fff; 
            font-family: 'Share Tech Mono', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Perspective Grid Background Layer */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(to right, rgba(188, 19, 254, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(188, 19, 254, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg);
            z-index: 1;
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(30px); }
        }

        /* CRT Scanline Display Filter Layer */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .container { 
            width: 330px; 
            border: 2px solid var(--neon-purple); 
            padding: 30px; 
            text-align: center; 
            background: rgba(6, 3, 8, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10;
            position: relative;
            box-shadow: 
                0 0 20px rgba(188, 19, 254, 0.4),
                inset 0 0 20px rgba(188, 19, 254, 0.3),
                0 0 40px rgba(255, 0, 127, 0.1);
        }

        .header { 
            display: flex; 
            flex-direction: column;
            gap: 4px;
            margin-bottom: 30px; 
            border-bottom: 1px solid rgba(188, 19, 254, 0.5); 
            padding-bottom: 12px; 
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 8px var(--neon-purple);
            font-weight: bold;
        }

        .game-badge {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue), 0 0 10px var(--neon-blue);
            text-transform: uppercase;
            text-align: left;
            margin-top: 2px;
        }

        .frame { 
            height: 180px; 
            border: 2px solid var(--neon-pink); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 30px;
            background: rgba(255, 0, 127, 0.05);
            box-shadow: 
                0 0 15px rgba(255, 0, 127, 0.4), 
                inset 0 0 20px rgba(255, 0, 127, 0.3);
            position: relative;
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: rgba(255, 0, 127, 0.02); 
            border: 1px solid var(--neon-pink); 
            color: #fff; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-family: inherit; 
            font-size: 13px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.5), inset 0 0 4px rgba(255, 0, 127, 0.2);
            transition: all 0.15s ease-in-out;
        }

        .btn:hover { 
            background: var(--neon-pink); 
            color: #000; 
            font-weight: bold;
            box-shadow: 0 0 25px var(--neon-pink), 0 0 10px #fff;
            text-shadow: none;
        }
        
        /* High-Frequency Brightness Strobe for Roulette State */
        .flash { 
            animation: hyperStrobe 0.15s infinite alternate; 
        }

        @keyframes hyperStrobe {
            0% { opacity: 0.8; filter: brightness(1); }
            100% { opacity: 1; filter: brightness(1.35); }
        }

        /* High-Intensity Saturated Glowing Accent for Locked Tribute Target */
        .locked-glow {
            animation: intenseGlow 1.2s infinite alternate ease-in-out;
        }

        @keyframes intenseGlow {
            from { text-shadow: 0 0 10px var(--white-glow), 0 0 25px var(--neon-pink), 0 0 40px var(--neon-pink); }
            to { text-shadow: 0 0 15px var(--white-glow), 0 0 35px var(--neon-pink), 0 0 65px var(--neon-pink), 0 0 95px var(--neon-pink); }
        }
        
        .highlight { 
            color: #fff;
            font-size: 38px; 
            font-weight: bold; 
            margin-top: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <span>THE FOXX TRAP</span>
                <span>SYS_GATE V5</span>
            </div>
            <div class="game-badge">// INTERACTIVE TRAP GAME</div>
        </div>
        <div id="roulette" class="frame flash">SYSTEM READY...</div>
        
        <button id="triggerBtn" class="btn" onclick="lockFate()">TRAP MY WALLET</button>
        
        <div id="actionContainer" style="display:none;">
            <button class="btn" onclick="executePayment()">1. SUBMIT TRIBUTE</button>
            <button class="btn" onclick="sharePunishment()">2. CONFESS RESULT ON X</button>
            <button class="btn" onclick="resetEngine()">🔄 RECALIBRATE / REPLAY</button>
        </div>
    </div>

    <script>
        // Verified database matching the layout within image.png exactly
        const outcomes = [
            { text: "WARNING: TRIBUTE LOCKED IN!<br><span class='highlight locked-glow'>$30</span>", amt: "$30", link: "https://throne.com/violetfoxxx888/item/1FC16DB3-6ECB-43BB-AF87-ABFBF641A6A9" },
            { text: "WARNING: TRIBUTE LOCKED IN!<br><span class='highlight locked-glow'>$45</span>", amt: "$45", link: "https://throne.com/violetfoxxx888/item/E9BA3E91-CE86-471B-853F-FF7F2F2888C7" },
            { text: "WARNING: TRIBUTE LOCKED IN!<br><span class='highlight locked-glow'>$50</span>", amt: "$50", link: "https://throne.com/violetfoxxx888/item/8E9809AC-DF45-4E1A-A3AF-E4C3F2E660CE" },
            { text: "WARNING: TRIBUTE LOCKED IN!<br><span class='highlight locked-glow'>$75</span>", amt: "$75", link: "https://throne.com/violetfoxxx888/item/11C05F35-8252-4756-969D-3E25951ED4D9" },
            { text: "WARNING: TRIBUTE LOCKED IN!<br><span class='highlight locked-glow'>$100</span>", amt: "$100", link: "https://throne.com/violetfoxxx888/item/EF6369CD-2652-419F-8879-1FC4DFA4AB2E" },
            { text: "WARNING: TRIBUTE LOCKED IN!<br><span class='highlight locked-glow'>$200</span>", amt: "$200", link: "https://throne.com/violetfoxxx888/item/5C68C4ED-19E5-40DD-8F57-B174D09042A9" }
        ];

        let interval;
        let final;
        let audioCtx = null;
        let musicInterval = null;

        // Code-generated 8-bit synthesizer engine
        function playSound(type) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = (type === 'spin' || type === 'click') ? 'square' : 'triangle';

                if (type === 'spin') {
                    osc.frequency.setValueAtTime(110 + Math.random() * 40, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.04);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.04);
                } 
                else if (type === 'lock') {
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(440, audioCtx.currentTime + 0.08);
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                } 
                else if (type === 'click') {
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) {
                console.log("Audio constraints handled successfully.");
            }
        }

        // Procedural Retro Arcade Background Loop Engine
        function startVintageMusicLoop() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Classic 4-step vintage arcade minor bassline note array
            const notes = [110.00, 130.81, 146.83, 164.81]; // A2, C3, D3, E3
            let currentStep = 0;

            musicInterval = setInterval(() => {
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle'; // Smooth vintage sub-bass style tone
                    osc.frequency.setValueAtTime(notes[currentStep], audioCtx.currentTime);
                    
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime); // Subtle background volume balance
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                    
                    currentStep = (currentStep + 1) % notes.length;
                } catch (err) {
                    clearInterval(musicInterval);
                }
            }, 300); // Steady rhythm loop speed
        }

        function start() { 
            interval = setInterval(() => { 
                const randomItem = outcomes[Math.floor(Math.random() * outcomes.length)];
                const safeLoopText = randomItem.text.replace(' locked-glow', '').replace('WARNING: TRIBUTE LOCKED IN!', 'ROULETTE ACTIVE...');
                document.getElementById('roulette').innerHTML = safeLoopText; 
                playSound('spin');
            }, 65); 
        }
        
        function lockFate() { 
            // Halt target shuffle routine
            clearInterval(interval); 
            
            // Instantly trigger vintage backdrop track alongside the heavy impact chime
            startVintageMusicLoop();
            playSound('lock');
            
            final = outcomes[Math.floor(Math.random() * outcomes.length)]; 
            document.getElementById('roulette').innerHTML = final.text; 
            document.getElementById('roulette').classList.remove('flash'); 
            document.getElementById('triggerBtn').style.display = 'none'; 
            document.getElementById('actionContainer').style.display = 'block';
        }
        
        function executePayment() { 
            playSound('click');
            if (final && final.link) {
                const targetWindow = window.open();
                targetWindow.opener = null;
                targetWindow.location = final.link;
            }
        }
        
        function sharePunishment() { 
            playSound('click');
            window.open(`https://twitter.com/intent/tweet?text=Caught in The Foxx Trap Game! Locked at ${final.amt}.`, '_blank'); 
        }
        
        function resetEngine() { 
            playSound('click');
            if(musicInterval) clearInterval(musicInterval);
            setTimeout(() => { location.reload(); }, 100);
        }
        
        window.onload = start;
    </script>
</body>
</html>
