<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FOXX TRAP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body { 
            background-color: #050505; 
            color: #bc13fe; 
            font-family: 'Share Tech Mono', monospace; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px;
        }
        .container { 
            width: 320px; border: 2px solid #bc13fe; padding: 25px; 
            text-align: center; background: rgba(0,0,0,0.85);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
        }
        .header { 
            display: flex; justify-content: space-between; font-size: 11px; 
            margin-bottom: 25px; border-bottom: 1px solid #bc13fe; padding-bottom: 10px;
            color: #00ffff; text-shadow: 0 0 5px #00ffff;
        }
        .frame { 
            height: 160px; border: 2px solid #ff007f; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.2);
        }
        .btn { 
            width: 100%; padding: 12px; margin: 6px 0; background: transparent; 
            border: 1px solid #ff007f; color: #ff007f; cursor: pointer; 
            text-transform: uppercase; font-family: inherit; font-size: 13px;
            transition: all 0.3s ease;
        }
        .btn:hover { background: #ff007f; color: #000; box-shadow: 0 0 15px #ff007f; }
        
        /* Cyberpunk Flashing Effect */
        .flash { animation: pulse 0.8s infinite alternate; }
        @keyframes pulse {
            from { opacity: 1; text-shadow: 0 0 5px #ff007f; }
            to { opacity: 0.5; text-shadow: 0 0 20px #ff007f; }
        }
        .highlight { color: #ff007f; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>THE FOXX TRAP</span>
            <span>SYS_GATE V5</span>
        </div>
        <div id="roulette" class="frame flash">SYSTEM READY...</div>
        
        <button id="triggerBtn" class="btn" onclick="lockFate()">TRAP MY WALLET</button>
        
        <div id="actionContainer" style="display:none;">
            <button class="btn" onclick="executePayment()">1. SUBMIT TRIBUTE</button>
            <button class="btn" onclick="sharePunishment()">2. CONFESS RESULT ON X</button>
            <button class="btn" onclick="resetEngine()">🔄 RECALIBRATE / REPLAY</button>
        </div>
    </div>

    <script>
        const outcomes = [
            { text: "TRIBUTE ALLOCATED:<br><span class='highlight'>$30</span>", amt: "$30", link: "https://throne.com/violetfoxxx888/item/1FC16DB3-6ECB-43BB-AF87-ABFBF641A6A9" },
            { text: "TRIBUTE ALLOCATED:<br><span class='highlight'>$45</span>", amt: "$45", link: "https://throne.com/violetfoxxx888/item/E9BA3E91-CE86-471B-853F-FF7F2F2888C7" },
            { text: "TRIBUTE ALLOCATED:<br><span class='highlight'>$50</span>", amt: "$50", link: "https://throne.com/violetfoxxx888/item/8E9809AC-DF45-4E1A-A3AF-E4C3F2E660CE" },
            { text: "TRIBUTE ALLOCATED:<br><span class='highlight'>$75</span>", amt: "$75", link: "https://throne.com/violetfoxxx888/item/11C05F35-8252-4756-969D-3E25951ED4D9" },
            { text: "TRIBUTE ALLOCATED:<br><span class='highlight'>$100</span>", amt: "$100", link: "https://throne.com/violetfoxxx888/item/EF6369CD-2652-419F-8879-1FC4DFA4AB2E" },
            { text: "TRIBUTE ALLOCATED:<br><span class='highlight'>$200</span>", amt: "$200", link: "https://throne.com/violetfoxxx888/item/5C68C4ED-19E5-40DD-8F57-B174D09042A9" }
        ];

        let interval;
        let final;

        function start() { 
            interval = setInterval(() => { 
                document.getElementById('roulette').innerHTML = outcomes[Math.floor(Math.random()*outcomes.length)].text; 
            }, 50); 
        }
        
        function lockFate() { 
            clearInterval(interval); 
            final = outcomes[Math.floor(Math.random()*outcomes.length)]; 
            document.getElementById('roulette').innerHTML = final.text; 
            document.getElementById('roulette').classList.remove('flash'); // Stop flash once locked
            document.getElementById('triggerBtn').style.display='none'; 
            document.getElementById('actionContainer').style.display='block';
        }
        
        function executePayment() { window.open(final.link, '_blank'); }
        function sharePunishment() { window.open(`https://twitter.com/intent/tweet?text=Caught in The Foxx Trap! Locked at ${final.amt}.`, '_blank'); }
        function resetEngine() { location.reload(); }
        
        window.onload = start;
    </script>
</body>
</html>
